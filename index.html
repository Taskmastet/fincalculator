<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Казна Лордерона — цена часа</title>
<style>
  /*
    Павший Лордерон / Отрекшиеся.
    Потускневшее королевское золото на чёрном камне, кость пергамента
    и некротический чумной свет Подгорода. Палитра аптекаря Чумы.
  */
  :root{
    --crypt:     #0a0c09;  /* провал склепа */
    --stone:     #13150f;  /* камень стены */
    --stone-up:  #1b1d14;  /* подсвеченный камень */
    --bone:      #d9cfb4;  /* кость / пергамент */
    --bone-dim:  #8c876f;  /* выцветший пергамент */
    --gold:      #7f6326;  /* потускневшее золото */
    --gold-lit:  #c6a352;  /* блик короны */
    --blight:    #7bbf2e;  /* чумная зелень */
    --blight-lit:#aef25a;  /* свечение язвы */
    --rot:       #2a3318;  /* мшистый тлен */
    --royal:     #3a2348;  /* королевский пурпур, выцветший */
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }

  body{
    min-height:100%;
    background:
      radial-gradient(130% 80% at 50% 118%, rgba(123,191,46,.10), transparent 55%),
      radial-gradient(120% 90% at 50% -15%, #1d2014 0%, var(--crypt) 62%, #000 100%);
    color:var(--bone);
    font-family:"Palatino Linotype","Book Antiqua",Palatino,"Georgia",serif;
    display:flex; align-items:center; justify-content:center;
    padding:6vh 5vw;
    position:relative; overflow-x:hidden;
  }

  /* поднимающиеся чумные споры */
  .spore{
    position:fixed; bottom:-12px; z-index:2;
    width:3px; height:3px; border-radius:50%;
    background:var(--blight-lit);
    box-shadow:0 0 6px 1px rgba(174,242,90,.7);
    opacity:0; pointer-events:none;
    animation:rise linear infinite;
  }
  @keyframes rise{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    12%{ opacity:.55; }
    80%{ opacity:.35; }
    100%{ transform:translateY(-104vh) translateX(var(--sx,10px)); opacity:0; }
  }

  /* лёгкая каменная зернистость */
  body::before{
    content:""; position:fixed; inset:0; z-index:1; pointer-events:none;
    opacity:.045; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  .decree{
    position:relative; z-index:3;
    width:100%; max-width:560px;
    background:
      linear-gradient(180deg, var(--stone-up), var(--stone) 55%, #0d0f0a 100%);
    border:1px solid #2c2a1c;
    padding:clamp(30px,6.5vw,58px) clamp(26px,6vw,56px) clamp(34px,6vw,56px);
    box-shadow:
      0 0 0 1px #000 inset,
      0 0 0 6px #0a0c09,
      0 0 0 7px #2c2a1c,
      0 40px 90px -25px #000,
      0 0 160px -50px rgba(123,191,46,.4);
  }
  /* золочёные уголки королевского указа */
  .decree::before, .decree::after{
    content:""; position:absolute; width:26px; height:26px; pointer-events:none;
    border:2px solid var(--gold); opacity:.8;
  }
  .decree::before{ top:12px; left:12px; border-right:none; border-bottom:none; }
  .decree::after{ bottom:12px; right:12px; border-left:none; border-top:none; }

  .crest{
    font-family:"Courier New",monospace;
    font-size:.66rem; letter-spacing:.46em; text-transform:uppercase;
    color:var(--gold-lit); padding-left:.5em; margin-bottom:1.5em;
    display:flex; align-items:center; gap:1em;
  }
  .crest::after{ content:""; flex:1; height:1px;
    background:linear-gradient(90deg, var(--gold), transparent); }

  h1{
    font-size:clamp(2.5rem,10vw,4.2rem);
    line-height:.94; font-weight:400; letter-spacing:.02em;
    color:var(--bone);
    /* выгравированное золото на камне */
    text-shadow:
      0 1px 0 #000, 0 2px 1px #000,
      0 0 26px rgba(198,163,82,.25);
    margin-bottom:.2em;
  }
  h1 .sub{
    display:block; margin-top:.85em;
    font-size:.26em; letter-spacing:.4em; text-transform:uppercase;
    color:var(--gold); font-family:"Courier New",monospace;
    text-shadow:none;
  }

  .scripture{
    font-style:italic; color:var(--bone-dim);
    font-size:.96rem; line-height:1.65; max-width:44ch;
    margin:1.7em 0 2.5em; padding-left:1.1em;
    border-left:2px solid var(--gold);
  }

  .field{ margin-bottom:1.8em; }
  label{
    display:block; font-family:"Courier New",monospace;
    font-size:.7rem; letter-spacing:.26em; text-transform:uppercase;
    color:var(--bone-dim); margin-bottom:.75em;
  }
  .well{ position:relative; }
  input[type="text"]{
    width:100%; background:transparent; border:none;
    border-bottom:1px solid #3b3826; color:var(--bone);
    font-family:inherit; font-size:1.95rem;
    padding:.15em 2.4em .25em 0; outline:none;
    transition:border-color .4s, color .4s;
  }
  input::placeholder{ color:#4a4733; font-style:italic; font-size:.82rem; }
  input:focus{ border-color:var(--blight); color:#fff; }
  .coin{
    position:absolute; right:0; bottom:.5em;
    font-family:"Courier New",monospace; font-size:.78rem;
    color:var(--gold-lit); letter-spacing:.12em;
  }
  .well::after{
    content:""; position:absolute; left:0; bottom:-1px; height:1px; width:0;
    background:linear-gradient(90deg, var(--blight-lit), var(--gold-lit));
    box-shadow:0 0 8px rgba(174,242,90,.6);
    transition:width .5s ease;
  }
  .well:focus-within::after{ width:100%; }

  button{
    width:100%; margin-top:.7em;
    background:transparent; color:var(--gold-lit);
    border:1px solid var(--gold);
    font-family:"Courier New",monospace; font-size:.8rem;
    letter-spacing:.36em; text-transform:uppercase;
    padding:1.3em; cursor:pointer; position:relative; overflow:hidden;
    transition:color .4s, border-color .4s, letter-spacing .4s, box-shadow .4s;
  }
  button::before{
    content:""; position:absolute; inset:0; z-index:-1;
    background:linear-gradient(90deg, var(--rot), var(--blight));
    transform:translateX(-101%); transition:transform .5s ease;
  }
  button:hover{
    color:#0a0c09; border-color:var(--blight-lit); letter-spacing:.42em;
    box-shadow:0 0 30px -6px rgba(174,242,90,.5);
  }
  button:hover::before{ transform:translateX(0); }
  button:focus-visible{ outline:2px solid var(--blight-lit); outline-offset:3px; }

  .verdict{
    margin-top:2.7em; padding-top:2.1em;
    border-top:1px solid #2c2a1c; text-align:center;
    opacity:0; filter:blur(7px); transform:translateY(10px);
    transition:opacity .9s ease, filter .9s ease, transform .9s ease;
  }
  .verdict.show{ opacity:1; filter:blur(0); transform:none; }

  /* печать-сигила над приговором */
  .sigil{
    width:42px; height:42px; margin:0 auto .9em;
    border:1px solid var(--gold); border-radius:50%;
    display:grid; place-items:center; position:relative;
    color:var(--blight-lit); font-size:1.1rem;
    box-shadow:0 0 18px -2px rgba(174,242,90,.5), inset 0 0 12px -4px rgba(174,242,90,.5);
  }
  .sigil::before{
    content:""; position:absolute; inset:4px; border:1px solid #2c2a1c; border-radius:50%;
  }
  .verdict.show .sigil{ animation:pulse 3.2s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 0 14px -2px rgba(174,242,90,.4), inset 0 0 10px -4px rgba(174,242,90,.4);} 50%{ box-shadow:0 0 26px 0 rgba(174,242,90,.7), inset 0 0 16px -3px rgba(174,242,90,.7);} }

  .lead{
    font-family:"Courier New",monospace; font-size:.68rem;
    letter-spacing:.38em; text-transform:uppercase;
    color:var(--bone-dim); margin-bottom:.55em;
  }
  .rate{
    font-size:clamp(3rem,15vw,5.4rem); line-height:1; color:#eafad0;
    text-shadow:0 0 36px rgba(174,242,90,.45), 0 2px 0 #000;
  }
  .rate small{ font-size:.26em; color:var(--gold-lit); letter-spacing:.1em; margin-left:.35em; text-shadow:none; }
  .epitaph{
    margin-top:1.15em; font-style:italic; color:var(--bone-dim);
    font-size:.98rem; line-height:1.6; max-width:42ch;
    margin-left:auto; margin-right:auto;
  }
  .verdict.error .sigil{ color:#d98a8a; border-color:#5a2a2a; box-shadow:0 0 16px -3px rgba(180,60,60,.5); }
  .verdict.error .rate{ font-size:clamp(1.5rem,6.5vw,2.3rem); color:#d98a8a; font-style:italic; text-shadow:0 2px 0 #000; }
  .verdict.error .lead{ color:#9c5454; }

  @media (prefers-reduced-motion: reduce){
    .spore{ display:none; }
    .verdict{ transition:opacity .3s; filter:none; transform:none; }
    .verdict.show .sigil{ animation:none; }
  }
</style>
</head>
<body>
  <main class="decree">
    <p class="crest">Казна павшего Лордерона</p>

    <h1>Цена часа
      <span class="sub">сколько стоит твоё время</span>
    </h1>

    <p class="scripture">
      Королевство пало, но счёт остался. Назови, сколько тебе платят и
      сколько часов ты отдаёшь взамен — и чумной свет покажет истинную
      цену одного часа твоей жизни.
    </p>

    <form id="calc" novalidate>
      <div class="field">
        <label for="salary">Жалованье за период</label>
        <div class="well">
          <input id="salary" type="text" inputmode="decimal"
                 placeholder="например, 80000" autocomplete="off" />
          <span class="coin">золотых</span>
        </div>
      </div>

      <div class="field">
        <label for="hours">Часы службы за тот же период</label>
        <div class="well">
          <input id="hours" type="text" inputmode="decimal"
                 placeholder="например, 160" autocomplete="off" />
          <span class="coin">часов</span>
        </div>
      </div>

      <button type="submit">Огласить цену</button>
    </form>

    <section id="verdict" class="verdict" aria-live="polite">
      <div class="sigil" aria-hidden="true">☠</div>
      <p class="lead">Цена одного часа</p>
      <p class="rate" id="rate">—</p>
      <p class="epitaph" id="epitaph"></p>
    </section>
  </main>

<script>
  (function(){
    "use strict";

    var form    = document.getElementById("calc");
    var salaryI = document.getElementById("salary");
    var hoursI  = document.getElementById("hours");
    var verdict = document.getElementById("verdict");
    var rateEl  = document.getElementById("rate");
    var epitaph = document.getElementById("epitaph");

    function num(raw){
      if(raw == null) return NaN;
      var c = String(raw).replace(/\s/g,"").replace(",",".");
      if(c === "") return NaN;
      return Number(c);
    }
    function money(v){
      return v.toLocaleString("ru-RU",{ minimumFractionDigits:2, maximumFractionDigits:2 });
    }

    // приговоры в духе Отрекшихся — тем мрачнее, чем дешевле час
    function epitaphFor(rate){
      if(rate < 100)  return "За такую плату даже мёртвые не встанут с колен.";
      if(rate < 300)  return "Часы утекают, как песок сквозь костяные пальцы.";
      if(rate < 700)  return "Достойно живого. Покуда ты ещё дышишь.";
      if(rate < 1500) return "Король одобрил бы такую казну.";
      return "Даже Тёмная Госпожа оценила бы твою цену.";
    }

    function render(cls, headHTML, body){
      verdict.classList.toggle("error", cls === "error");
      verdict.classList.remove("show");
      void verdict.offsetWidth;          // перезапуск проявления
      rateEl.innerHTML = headHTML;
      epitaph.textContent = body || "";
      verdict.classList.add("show");
    }

    form.addEventListener("submit", function(e){
      e.preventDefault();
      var s = num(salaryI.value);
      var h = num(hoursI.value);

      if(isNaN(s) || isNaN(h)) return render("error", "Назови оба числа.");
      if(s < 0 || h < 0)       return render("error", "Отрицательного времени не бывает.");
      if(h === 0)              return render("error", "Ноль часов — ноль ответа.");

      var rate = s / h;
      render("ok", money(rate) + ' <small>зол. / час</small>', epitaphFor(rate));
    });
  })();

  // рассыпаем чумные споры
  (function(){
    if(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    var n = 18;
    for(var i=0;i<n;i++){
      var s = document.createElement("span");
      s.className = "spore";
      s.style.left = (Math.random()*100) + "vw";
      s.style.setProperty("--sx", (Math.random()*60-30) + "px");
      var dur = 9 + Math.random()*11;
      s.style.animationDuration = dur + "s";
      s.style.animationDelay = (-Math.random()*dur) + "s";
      var sz = 2 + Math.random()*2.5;
      s.style.width = s.style.height = sz + "px";
      document.body.appendChild(s);
    }
  })();
</script>
</body>
</html>
