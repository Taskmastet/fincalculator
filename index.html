<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>В ЧАС — расчёт цены твоего времени</title>
<style>
  /*
    Silent Hill 2 — "Otherworld" income calculator.
    Палитра вытащена из ржавой решётки Подземелья, тумана Тихого Холма
    и сухой крови на стенах больницы Брукхейвен.
  */
  :root{
    --fog:        #c8c3b6;  /* выцветший туман */
    --ash:        #8a8478;  /* пепельный текст */
    --void:       #0a0908;  /* провал темноты */
    --void-soft:  #14110f;  /* грязный чёрный */
    --rust:       #6e4326;  /* ржавчина решётки */
    --rust-lit:   #a8632f;  /* подсвеченная ржавчина */
    --blood:      #6b1414;  /* запёкшаяся кровь */
    --blood-lit:  #9c2222;  /* свежее пятно */
    --bone:       #e7e2d6;  /* кость / бумага записки */
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{ height:100%; }

  body{
    min-height:100%;
    background:
      radial-gradient(120% 90% at 50% -10%, #1c1815 0%, var(--void) 60%, #000 100%);
    color:var(--fog);
    font-family:"Georgia","Times New Roman",serif;
    letter-spacing:.01em;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:6vh 5vw;
    overflow-x:hidden;
    position:relative;
  }

  /* зернистый шум — телевизионная рябь приёмника */
  body::before{
    content:"";
    position:fixed;
    inset:-50%;
    pointer-events:none;
    z-index:5;
    opacity:.05;
    mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    animation:grain .4s steps(3) infinite;
  }
  @keyframes grain{
    0%{transform:translate(0,0)} 33%{transform:translate(-2%,1%)} 66%{transform:translate(1%,-2%)} 100%{transform:translate(0,0)}
  }

  /* ползущий туман поверх всего */
  body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:4;
    background:
      radial-gradient(60% 50% at 20% 30%, rgba(200,195,182,.06), transparent 70%),
      radial-gradient(50% 60% at 85% 75%, rgba(200,195,182,.05), transparent 70%);
    animation:drift 26s ease-in-out infinite alternate;
  }
  @keyframes drift{
    from{transform:translate(-3%,0) scale(1.05)} to{transform:translate(4%,2%) scale(1.12)}
  }

  .frame{
    position:relative;
    z-index:6;
    width:100%;
    max-width:540px;
    background:linear-gradient(180deg, var(--void-soft), #0c0a09 90%);
    border:1px solid #2a231d;
    box-shadow:
      0 0 0 1px #000 inset,
      0 30px 80px -20px #000,
      0 0 120px -40px var(--rust);
    padding:clamp(28px,6vw,52px);
  }

  /* ржавая верхняя кромка — намёк на решётку Otherworld */
  .frame::before{
    content:"";
    position:absolute; left:0; right:0; top:0; height:3px;
    background:repeating-linear-gradient(90deg,
      var(--rust) 0 6px, transparent 6px 11px, var(--rust-lit) 11px 13px, transparent 13px 20px);
    opacity:.7;
  }

  .eyebrow{
    font-family:"Courier New",monospace;
    font-size:.7rem;
    letter-spacing:.5em;
    text-transform:uppercase;
    color:var(--rust-lit);
    padding-left:.5em;
    margin-bottom:1.4em;
    opacity:.85;
  }

  h1{
    font-size:clamp(2.6rem,11vw,4.4rem);
    line-height:.92;
    font-weight:400;
    color:var(--bone);
    letter-spacing:-.02em;
    text-shadow:0 2px 0 #000, 0 0 30px rgba(0,0,0,.9);
    margin-bottom:.15em;
  }
  h1 .pale{
    display:block;
    font-size:.32em;
    letter-spacing:.45em;
    color:var(--ash);
    text-transform:uppercase;
    margin-top:1.1em;
    text-shadow:none;
  }

  .note{
    font-style:italic;
    color:var(--ash);
    font-size:.92rem;
    line-height:1.6;
    margin:1.6em 0 2.4em;
    padding-left:1em;
    border-left:1px solid var(--rust);
    max-width:42ch;
  }

  .field{ margin-bottom:1.7em; }

  label{
    display:block;
    font-family:"Courier New",monospace;
    font-size:.72rem;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--ash);
    margin-bottom:.7em;
  }

  .input-wrap{ position:relative; }

  input[type="text"]{
    width:100%;
    background:transparent;
    border:none;
    border-bottom:1px solid #3a312a;
    color:var(--bone);
    font-family:"Georgia",serif;
    font-size:1.9rem;
    padding:.2em 2.2em .25em 0;
    outline:none;
    transition:border-color .4s, color .4s;
  }
  input::placeholder{ color:#4a423a; font-style:italic; font-size:.9rem; }
  input:focus{ border-color:var(--rust-lit); color:#fff; }

  .unit{
    position:absolute; right:0; bottom:.45em;
    font-family:"Courier New",monospace;
    font-size:.8rem; color:var(--rust); letter-spacing:.15em;
  }

  /* подсветка-«фонарик» под активным полем */
  .input-wrap::after{
    content:""; position:absolute; left:0; bottom:-1px; height:1px; width:0;
    background:linear-gradient(90deg,var(--blood-lit),var(--rust-lit));
    transition:width .5s ease;
  }
  .input-wrap:focus-within::after{ width:100%; }

  button{
    width:100%;
    margin-top:.6em;
    background:transparent;
    color:var(--bone);
    border:1px solid var(--rust);
    font-family:"Courier New",monospace;
    font-size:.82rem;
    letter-spacing:.38em;
    text-transform:uppercase;
    padding:1.25em;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:color .4s, border-color .4s, letter-spacing .4s;
  }
  button::before{
    content:""; position:absolute; inset:0; z-index:-1;
    background:linear-gradient(90deg,var(--blood),var(--rust));
    transform:translateX(-101%);
    transition:transform .5s ease;
  }
  button:hover{ color:#fff; border-color:var(--blood-lit); letter-spacing:.44em; }
  button:hover::before{ transform:translateX(0); }
  button:focus-visible{ outline:2px solid var(--rust-lit); outline-offset:3px; }

  /* результат — проявляется из тумана */
  .verdict{
    margin-top:2.6em;
    padding-top:2em;
    border-top:1px solid #2a231d;
    opacity:0;
    filter:blur(8px);
    transform:translateY(10px);
    transition:opacity .9s ease, filter .9s ease, transform .9s ease;
  }
  .verdict.show{ opacity:1; filter:blur(0); transform:none; }

  .verdict .lead{
    font-family:"Courier New",monospace;
    font-size:.7rem; letter-spacing:.4em; text-transform:uppercase;
    color:var(--ash); margin-bottom:.5em;
  }
  .rate{
    font-size:clamp(3rem,16vw,5.5rem);
    line-height:1; color:var(--bone); font-weight:400;
    text-shadow:0 0 40px rgba(168,99,47,.25);
  }
  .rate small{ font-size:.28em; color:var(--rust-lit); letter-spacing:.1em; margin-left:.3em; }

  .epitaph{
    margin-top:1.1em;
    font-style:italic;
    font-size:.95rem;
    color:var(--ash);
    line-height:1.55;
    max-width:40ch;
  }

  .verdict.error .rate{ color:var(--blood-lit); font-size:clamp(1.6rem,7vw,2.4rem); font-style:italic; }
  .verdict.error .lead{ color:var(--blood-lit); }

  @media (prefers-reduced-motion: reduce){
    body::before, body::after{ animation:none; }
    .verdict{ transition:opacity .3s; filter:none; transform:none; }
  }
</style>
</head>
<body>
  <main class="frame">
    <p class="eyebrow">Brookhaven · оценка времени</p>
    <h1>В&nbsp;час
      <span class="pale">сколько стоит твой час</span>
    </h1>

    <p class="note">
      Здесь нет долгов и премий — только два числа. Сколько тебе платят и
      сколько часов ты за это отдаёшь. Туман покажет, во что обходится час
      твоей жизни.
    </p>

    <form id="calc" novalidate>
      <div class="field">
        <label for="salary">Зарплата за период</label>
        <div class="input-wrap">
          <input id="salary" type="text" inputmode="decimal"
                 placeholder="например, 80000" autocomplete="off" />
          <span class="unit">₽</span>
        </div>
      </div>

      <div class="field">
        <label for="hours">Отработанные часы за тот же период</label>
        <div class="input-wrap">
          <input id="hours" type="text" inputmode="decimal"
                 placeholder="например, 160" autocomplete="off" />
          <span class="unit">ЧАС</span>
        </div>
      </div>

      <button type="submit">Узнать цену часа</button>
    </form>

    <section id="verdict" class="verdict" aria-live="polite">
      <p class="lead">Цена одного часа</p>
      <p class="rate" id="rate">—</p>
      <p class="epitaph" id="epitaph"></p>
    </section>
  </main>

<script>
  (function(){
    "use strict";

    var form    = document.getElementById("calc");
    var salaryI = document.getElementById("salary");
    var hoursI  = document.getElementById("hours");
    var verdict = document.getElementById("verdict");
    var rateEl  = document.getElementById("rate");
    var epitaph = document.getElementById("epitaph");

    // парсим число, прощая пробелы и запятую вместо точки
    function num(raw){
      if(raw == null) return NaN;
      var cleaned = String(raw).replace(/\s/g,"").replace(",",".");
      if(cleaned === "") return NaN;
      return Number(cleaned);
    }

    function money(v){
      return v.toLocaleString("ru-RU",{ minimumFractionDigits:2, maximumFractionDigits:2 });
    }

    // строки в духе Тихого Холма — зависят от того, насколько дёшев час
    function epitaphFor(rate){
      if(rate < 100)  return "Туман густой. За такие деньги его и не разглядеть.";
      if(rate < 300)  return "Часы уходят в темноту по одному. Ты их почти не замечаешь.";
      if(rate < 700)  return "Каждый час чего-то стоит. Вопрос — стоишь ли ты его себе.";
      if(rate < 1500) return "Дорога. Но и плата за неё под стать.";
      return "Время здесь ценят. Постарайся не потратить его впустую.";
    }

    function fail(msg){
      verdict.classList.add("error");
      verdict.classList.remove("show");
      // перезапуск анимации проявления
      void verdict.offsetWidth;
      rateEl.textContent = msg;
      epitaph.textContent = "";
      verdict.classList.add("show");
    }

    function show(rate){
      verdict.classList.remove("error");
      verdict.classList.remove("show");
      void verdict.offsetWidth;
      rateEl.innerHTML = money(rate) + ' <small>₽ / час</small>';
      epitaph.textContent = epitaphFor(rate);
      verdict.classList.add("show");
    }

    form.addEventListener("submit", function(e){
      e.preventDefault();
      var s = num(salaryI.value);
      var h = num(hoursI.value);

      if(isNaN(s) || isNaN(h)){
        fail("Назови оба числа."); return;
      }
      if(s < 0 || h < 0){
        fail("Отрицательного времени не бывает."); return;
      }
      if(h === 0){
        fail("Ноль часов — ноль ответа."); return;
      }
      show(s / h);
    });
  })();
</script>
</body>
</html>
